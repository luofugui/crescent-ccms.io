<script>
  document.addEventListener('DOMContentLoaded', function() {
    var trigger = document.getElementById('menu-trigger');
    var content = document.getElementById('menu-content');
    
    if (trigger && content) {
      trigger.addEventListener('click', function(e) {
        e.preventDefault();
        if (content.classList.contains('dn')) {
          content.classList.remove('dn');
          content.classList.add('db');
          trigger.innerHTML = '✕';
        } else {
          content.classList.add('dn');
          content.classList.remove('db');
          trigger.innerHTML = '☰';
        }
      });
    }

    // Back to Top Button Logic
    var backToTopBtn = document.getElementById('back-to-top');
    if (backToTopBtn) {
      window.addEventListener('scroll', function() {
        if (window.scrollY > 300) {
          backToTopBtn.classList.remove('o-0');
          backToTopBtn.classList.add('o-100');
          backToTopBtn.style.pointerEvents = 'auto';
        } else {
          backToTopBtn.classList.remove('o-100');
          backToTopBtn.classList.add('o-0');
          backToTopBtn.style.pointerEvents = 'none';
        }
      });

      backToTopBtn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }
  });
</script>
